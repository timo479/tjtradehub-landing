name: MetaAPI Inactivity Undeploy

on:
  schedule:
    - cron: "0 2 * * *"  # daily at 02:00 UTC
  workflow_dispatch:

jobs:
  undeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger undeploy cron
        run: |
          response=$(curl -s -o /tmp/response.txt -w "%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/undeploy")
          echo "HTTP Status: $response"
          echo "Response: $(cat /tmp/response.txt)"
          if [ "$response" -lt 200 ] || [ "$response" -ge 300 ]; then
            echo "Error: unexpected status $response"
            exit 1
          fi
